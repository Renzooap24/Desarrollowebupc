<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Kompressur S.A.C.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="Página-de-inicio.css"> <!-- Enlace al archivo CSS externo -->
</head>
<body>
    <div class="login-card text-center">
        <h2 class="mb-3">Iniciar Sesión</h2>
        <p class="text-muted mb-4">Ingresa tus credenciales para acceder a tu cuenta</p>
        <form id="login-form">
            <div class="mb-3 form-control-with-icon">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" class="form-control" id="email" placeholder="Correo electrónico" required>
            </div>
            <div class="mb-4 form-control-with-icon">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
            </div>
            <div class="d-grid gap-2 mb-3">
                <button type="button" class="btn btn-primary btn-lg" id="login-button">Iniciar Sesión</button>
            </div>
            <p class="text-muted">o</p>
            <a href="#" class="text-primary text-decoration-none">¿Olvidaste tu contraseña?</a>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // JavaScript para validar el inicio de sesión
        document.getElementById('login-button').addEventListener('click', function () {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Validar usuario y contraseña
            if (email === 'admin' && password === '12345678') {
                // Redirigir a la página principal
                window.location.href = 'pagina principal.html';
            } else {
                // Mostrar mensaje de error
                alert('Usuario o contraseña incorrectos. Inténtalo de nuevo.');
            }
        });
    </script>
</body>
</html>
