<div class="login-card text-center">
  <h2 class="mb-3">Iniciar Sesión</h2>
  <p class="text-muted mb-4">Ingresa tus credenciales para acceder a tu cuenta</p>
  
  <form id="login-form">
    <div class="mb-3 form-control-with-icon">
      <i class="fas fa-envelope input-icon"></i>
      <input type="email" class="form-control" [(ngModel)]="email" name="email" placeholder="Correo electrónico" required>
    </div>
    <div class="mb-4 form-control-with-icon">
      <i class="fas fa-lock input-icon"></i>
      <input type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="Contraseña" required>
    </div>
    <div class="d-grid gap-2 mb-3">
      <button type="button" class="btn btn-primary btn-lg" (click)="iniciarSesion()">
        Iniciar Sesión
      </button>
    </div>
    <p class="text-muted">o</p>
    <a href="#" class="text-primary text-decoration-none">¿Olvidaste tu contraseña?</a>
  </form>
</div>
