<main class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="#">Volver a la Página Principal</a></li>
            <li class="breadcrumb-item active" aria-current="page">Máquinas</li>
        </ol>
    </nav>

    <h1 class="mb-2">Máquinas</h1>
    <p class="text-muted mb-4">Administación de máquinas</p>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="flex-grow-1 me-2">
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="fas fa-search"></i></span>
                <input [(ngModel)]="filtro" type="text" class="form-control" placeholder="Buscar máquinas por nombre, código...">
            </div>
        </div>
        <button class="btn btn-outline-secondary me-2"><i class="fas fa-filter"></i> Todos los Tipos</button>
        <button class="btn btn-primary me-2"><i class="fas fa-file-invoice"></i> Cotizaciones</button>
        <button class="btn btn-outline-dark"><i class="fas fa-download"></i> Exportar</button>
    </div>

    <section class="row g-3 mb-4">
        <div class="col-md-3"><div class="bg-white summary-card d-flex align-items-center"><i class="fas fa-wrench text-primary me-3" style="font-size: 2rem;"></i><div><p class="mb-0 text-muted">Total Máquinas</p><h4 class="mb-0 fw-bold">{{maquinas.length}}</h4></div></div></div>
        <div class="col-md-3"><div class="bg-white summary-card d-flex align-items-center"><i class="fas fa-check-circle text-success me-3" style="font-size: 2rem;"></i><div><p class="mb-0 text-muted">Operativas</p><h4 class="mb-0 fw-bold">1</h4></div></div></div>
        <div class="col-md-3"><div class="bg-white summary-card d-flex align-items-center"><i class="fas fa-cog text-warning me-3" style="font-size: 2rem;"></i><div><p class="mb-0 text-muted">En Mantenimiento</p><h4 class="mb-0 fw-bold">3</h4></div></div></div>
        <div class="col-md-3"><div class="bg-white summary-card d-flex align-items-center"><i class="fas fa-exclamation-triangle text-danger me-3" style="font-size: 2rem;"></i><div><p class="mb-0 text-muted">Fuera de Servicio</p><h4 class="mb-0 fw-bold">2</h4></div></div></div>
    </section>

    <section class="table-container">
        <h5 class="mb-4">Gestión de Maquinas</h5>
        <table class="table table-hover table-striped">
            <thead>
                <tr>
                    <th>Código</th> <th>Nombre</th> <th>Estado</th> <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let s of maquinasFiltrados; let i = index">
                    
                    <td>{{ s.codigo }}</td>
                    <td>{{ s.nombre }}</td>
                    <td>{{ s.estado }}</td>
                    
                    <td><button class="btn btn-sm btn-info" (click)="verDetalle(i)">Ver</button></td>
                </tr>
            </tbody>
        </table>
    </section>
</main>
